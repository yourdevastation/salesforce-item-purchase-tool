<template>
  <lightning-modal-header label={item.name}></lightning-modal-header>

  <lightning-modal-body>
    <div class="slds-grid slds-wrap slds-gutters slds-align_absolute-center">
      <div class="slds-col slds-size_1-of-2 slds-text-align_center">
        <template if:true={item.image}>
          <img
            src={item.image}
            alt={item.name}
            style="
              max-width: 100%;
              max-height: 250px;
              border-radius: 8px;
              object-fit: cover;
            "
          />
        </template>
      </div>

      <div class="slds-col slds-size_1-of-2">
        <lightning-record-view-form
          record-id={recordId}
          object-api-name={objectApiName}
          density="comfy"
        >
          <lightning-output-field
            field-name={fields.name}
          ></lightning-output-field>
          <lightning-output-field
            field-name={fields.price}
          ></lightning-output-field>
          <lightning-output-field
            field-name={fields.type}
          ></lightning-output-field>
          <lightning-output-field
            field-name={fields.family}
          ></lightning-output-field>
          <lightning-output-field
            field-name={fields.quantity}
          ></lightning-output-field>
          <lightning-output-field
            field-name={fields.description}
          ></lightning-output-field>
        </lightning-record-view-form>
      </div>
    </div>
  </lightning-modal-body>

  <lightning-modal-footer>
    <lightning-button
      label="Close"
      onclick={handleClose}
      class="slds-m-right_small"
    ></lightning-button>
    <lightning-button
      label="Add to Cart"
      variant="brand"
      onclick={handleAddToCart}
      disabled={item.isOutOfStock}
    >
    </lightning-button>
  </lightning-modal-footer>
</template>
